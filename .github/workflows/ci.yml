name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      # `serve` is needed because `tools/knowledge/watcher.py` imports
      # `watchdog` unconditionally at module top, and several test modules
      # transitively load it during pytest collection.
      - name: Install dependencies
        run: uv sync --extra dev --extra serve

      - name: Run pytest
        run: uv run --extra dev --extra serve python -m pytest -q

  check:
    name: mdblueprint-check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      - name: Validate example knowledge base
        run: uv run python -m tools.knowledge.check docs/knowledge

  lint:
    name: mdblueprint-lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      # LLM-backed detectors are skipped here. They need an Anthropic
      # account and run on a separate nightly workflow (see
      # .github/workflows/nightly-llm-lint.yml when it lands). The
      # deterministic suite is the right gate for every PR: fast, free,
      # reproducible.
      - name: Lint example knowledge base (deterministic only)
        run: uv run mdblueprint-lint docs/knowledge --no-llm --strict-warnings
