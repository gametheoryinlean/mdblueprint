{% extends "base.html" %}
{% block content %}
<h1>Dependency Graph</h1>
<div id="graph-container" style="width:100%;height:600px;border:1px solid var(--border);border-radius:4px;"></div>
<script src="https://cdn.jsdelivr.net/npm/cytoscape@3/dist/cytoscape.min.js"></script>
<script>
  fetch('graph.json')
    .then(r => r.json())
    .then(data => {
      const elements = [];
      data.nodes.forEach(n => {
        elements.push({ data: { id: n.id, label: n.title, kind: n.kind, status: n.status } });
      });
      data.edges.forEach(e => {
        elements.push({ data: { source: e.from, target: e.to } });
      });
      cytoscape({
        container: document.getElementById('graph-container'),
        elements: elements,
        style: [
          { selector: 'node', style: {
            'label': 'data(label)', 'font-size': '11px',
            'background-color': '#4a90d9', 'color': '#222',
            'text-valign': 'bottom', 'text-margin-y': 4,
            'width': 24, 'height': 24
          }},
          { selector: 'node[kind="theorem"]', style: { 'background-color': '#d94a4a' }},
          { selector: 'node[kind="example"]', style: { 'background-color': '#4ad977' }},
          { selector: 'edge', style: {
            'width': 1.5, 'line-color': '#aaa',
            'target-arrow-color': '#aaa', 'target-arrow-shape': 'triangle',
            'curve-style': 'bezier'
          }}
        ],
        layout: { name: 'breadthfirst', directed: true, spacingFactor: 1.5 }
      });
    });
</script>
{% endblock %}
