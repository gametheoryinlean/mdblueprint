{% extends "base.html" %}
{% block content %}
<h1>Keyword: {{ keyword }}</h1>

<div class="blueprint-node-list">
  {% for node in nodes %}
  <article class="{{ node.kind }}_thmwrapper theorem-style-{{ node.kind }} summary-node">
    <header class="{{ node.kind }}_thmheading thm-heading">
      <span class="{{ node.kind }}_thmcaption thm-caption">{{ node.view.caption }}</span>
      <a class="{{ node.kind }}_thmtitle thm-title" href="{{ node.href }}">{{ node.title }}</a>
      <span class="badge status-{{ node.status }}">{{ node.status }}</span>
    </header>
  </article>
  {% endfor %}
</div>
{% endblock %}
