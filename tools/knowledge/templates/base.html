<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }} — {{ site.title }}</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/katex@0.16.46/dist/katex.min.css"
        integrity="sha384-hW6ZmmePRD2f/9cuxGE6C9faGprtIBOme5OLUiEjtRKMTN67tY23ur9eAi21H8De"
        crossorigin="anonymous">
  <link rel="stylesheet" href="{{ root }}style.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.46/dist/katex.min.js"
          integrity="sha384-FVvsvR4UzyIP8Y5hVvHjOfjVh+LWV78ll63SYx1t+nuuMPGMAihB8dJ2YsYyg1Wb"
          crossorigin="anonymous"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.46/dist/contrib/auto-render.min.js"
          integrity="sha384-bjyGPfbij8/NDKJhSGZNP/khQVgtHUE5exjm4Ydllo42FwIgYsdLO2lXGmRBf5Mz"
          crossorigin="anonymous"></script>
  <script defer>
    document.addEventListener("DOMContentLoaded", () => {
      window.MDBLUEPRINT_MATH_OPTIONS = {{ math_options_json | safe }};
      renderMathInElement(document.body, window.MDBLUEPRINT_MATH_OPTIONS);
    });
  </script>
</head>
<body>
  <nav class="sidebar">
    <a class="logo" href="{{ root }}index.html">{{ site.short_title or site.title }}</a>
    <a class="nav-link" href="{{ root }}dep_graph_document.html">Dependency graph</a>
    <section class="nav-section" aria-labelledby="nav-topics">
      <button class="sidebar-toggle" type="button" aria-expanded="true" aria-controls="topic-list">
        <span class="toggle-icon" aria-hidden="true">▾</span> Topics
      </button>
      <ul id="topic-list" class="topic-list nav-list">
      {% for topic in topics %}
        <li><a href="{{ root }}{{ topic }}/index.html">{{ topic }}</a></li>
      {% endfor %}
      </ul>
    </section>
    {% if keywords %}
    <section class="nav-section" aria-labelledby="nav-keywords">
      <button class="sidebar-toggle sidebar-toggle-keywords" type="button" aria-expanded="true" aria-controls="keyword-list">
        <span class="toggle-icon" aria-hidden="true">▾</span> Keywords
      </button>
      <ul id="keyword-list" class="keyword-list nav-list">
      {% for keyword in keywords %}
        <li><a href="{{ root }}keywords/{{ keyword }}.html">{{ keyword }}</a></li>
      {% endfor %}
      </ul>
    </section>
    {% endif %}
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
  <script src="{{ root }}graph.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var btn = document.querySelector('.sidebar-toggle');
      var list = document.getElementById('topic-list');
      if (!btn || !list) return;
      var stored = localStorage.getItem('sidebar-topics-folded');
      var folded = stored === 'true';
      list.hidden = folded;
      btn.setAttribute('aria-expanded', String(!folded));
      btn.addEventListener('click', function() {
        folded = !folded;
        list.hidden = folded;
        btn.setAttribute('aria-expanded', String(!folded));
        localStorage.setItem('sidebar-topics-folded', String(folded));
      });
      var keywordBtn = document.querySelector('.sidebar-toggle-keywords');
      var keywordList = document.getElementById('keyword-list');
      if (keywordBtn && keywordList) {
        var kwStored = localStorage.getItem('sidebar-keywords-folded');
        var kwFolded = kwStored === 'true';
        keywordList.hidden = kwFolded;
        keywordBtn.setAttribute('aria-expanded', String(!kwFolded));
        keywordBtn.addEventListener('click', function() {
          kwFolded = !kwFolded;
          keywordList.hidden = kwFolded;
          keywordBtn.setAttribute('aria-expanded', String(!kwFolded));
          localStorage.setItem('sidebar-keywords-folded', String(kwFolded));
        });
      }
    });
  </script>
</body>
</html>
