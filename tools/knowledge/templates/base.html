<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }} — mdblueprint</title>
  <link rel="stylesheet" href="{{ root }}style.css">
  <script defer>
    window.MathJax = {
      tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3.2.2/es5/tex-mml-chtml.js"
          integrity="sha384-Wuix6BuhrWbjDBs24bXrjf4ZQ5aFeFWBuKkFekO2t8xFU0iNaLQfp2K6/1Nxveei"
          crossorigin="anonymous"></script>
</head>
<body>
  <nav class="sidebar">
    <a class="logo" href="{{ root }}index.html">mdblueprint</a>
    <section class="nav-section" aria-labelledby="nav-topics">
      <h2 id="nav-topics">Topics</h2>
      <ul class="topic-list nav-list">
      {% for topic in topics %}
        <li><a href="{{ root }}{{ topic }}/index.html">{{ topic }}</a></li>
      {% endfor %}
      </ul>
    </section>
    {% if keywords %}
    <section class="nav-section" aria-labelledby="nav-keywords">
      <h2 id="nav-keywords">Keywords</h2>
      <ul class="keyword-list nav-list">
      {% for keyword in keywords %}
        <li><a href="{{ root }}keywords/{{ keyword }}.html">{{ keyword }}</a></li>
      {% endfor %}
      </ul>
    </section>
    {% endif %}
    <a class="nav-link" href="{{ root }}dep_graph_document.html">Dependency graph</a>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
  <script src="{{ root }}graph.js"></script>
</body>
</html>
